services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: camplify_rv_production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./camplify-rv-api
    ports:
      - "7777:7777"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db/camplify_rv_production
      RAILS_ENV: production
      SECRET_KEY_BASE: changeme_in_production_use_rails_secret
      RAILS_LOG_TO_STDOUT: "true"

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client JS bundle at build time — must match the host-exposed API port
        NEXT_PUBLIC_API_URL: http://localhost:7777/api/v1
    ports:
      - "8888:8888"
    depends_on:
      - api
    environment:
      # API_URL: used by Next.js server-side code (SSR/RSC) — Docker internal hostname
      API_URL: http://api:7777/api/v1

volumes:
  postgres_data:
